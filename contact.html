<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | CALMI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <h2 class="logo">CALMI</h2>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">Product</a></li>
      <li><a href="team.html">Team</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="demo.html">Try Demo</a></li>
    </ul>
  </nav>

  <section class="page-section contact-page">
    <h1>Contact Us</h1>

    <form class="contact-form">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email" required>
      <textarea rows="5" placeholder="Your Message"></textarea>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>

    <div class="waitlist-cta">
      <p>Want to be first in line for CALMI? Join our waitlist and share your experience—it helps us build something that truly supports remembrance.</p>
      <a href="https://docs.google.com/forms/d/1u--4lO0Mme1MExjLRsgUja7HMF2YsxgxfcS31DDlOsg/viewform"
         target="_blank" rel="noopener noreferrer" class="btn-waitlist">
        ♥ Get on Waitlist
      </a>
    </div>
  </section>

  <footer>
    <p>© 2026 CALMI. All Rights Reserved.</p>
  </footer>
    <script>
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    if (toggle && links) {
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        links.classList.toggle('open');
      });
      links.querySelectorAll('a').forEach(a =>
        a.addEventListener('click', () => {
          toggle.classList.remove('open');
          links.classList.remove('open');
        })
      );
    }
  </script>
</body>
</html>
